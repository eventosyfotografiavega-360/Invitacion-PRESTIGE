<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boda Alicia y Mario | Vega 360</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&family=Montserrat:wght@200;400&family=Pinyon+Script&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="style.css?v=6.0">
</head>
<body>

    <div id="envelope-wrapper">
        <div class="envelope" onclick="openEnvelope()">
            <div class="flap"></div>
            <div class="body"></div>
            <div class="seal-container">
                <div class="tooltip">Click Aquí</div>
                <div class="wax-seal">
                    <span class="initials">A & M</span>
                </div>
            </div>
        </div>
    </div>

    <audio id="miMusica" loop><source src="musica.mp3" type="audio/mpeg"></audio>

    <main id="main-content" style="display:none; opacity:0;">
        <section id="inicio" class="hero">
            <div class="hero-overlay">
                <h1 class="caligrafia-blanca">Alicia & Mario</h1>
                <p class="fecha-hero">22 . 08 . 2026</p>
            </div>
        </section>

        <section class="countdown-section">
            <div class="elegant-card">
                <h2 class="script-oro">¡Nos casamos!</h2>
                <div id="timer">
                    <div class="t-block"><span id="days">00</span><p>Días</p></div>
                    <div class="t-block"><span id="hours">00</span><p>Hrs</p></div>
                    <div class="t-block"><span id="mins">00</span><p>Min</p></div>
                    <div class="t-block"><span id="secs">00</span><p>Seg</p></div>
                </div>
                <a href="#" class="btn-calendar">AGREGAR A CALENDARIO</a>
            </div>
        </section>
        
        </main>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="script.js?v=6.0"></script>
</body>
</html>
